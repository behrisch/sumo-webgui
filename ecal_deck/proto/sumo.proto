syntax = "proto3";
package sumo;

message Vehicle {
  string              id         = 1;
  double              x          = 2;
  double              y          = 3;
  float               speed      = 4;
  float               angle      = 5;
  string              type_id    = 6;
  map<string, double> attributes = 7;
  float               length     = 8;  // type length in metres (cached per type_id)
  float               width      = 9;  // type width in metres  (cached per type_id)
  string              gui_shape  = 10; // traci vehicletype shape class, e.g. "passenger", "truck"
}

message MobileAgent {
  string id      = 1;
  double x       = 2;
  double y       = 3;
  float  angle   = 4;
  string type_id = 5;
}

message SimStep {
  int64                time_ms    = 1;
  repeated Vehicle     vehicles   = 2;
  repeated MobileAgent persons    = 3;
  repeated MobileAgent containers = 4;
}

message TLSPhase {
  string id    = 1;
  string state = 2;
}

message TLSUpdate {
  int64             time_ms = 1;
  repeated TLSPhase lights  = 2;
}

message NetworkData {
  bool   geo_referenced = 2;
  string cache_path     = 3;
}

message TlsEntry {
  string id       = 1;
  string tls      = 2;
  int32  tl_index = 3;
}

message NetworkGeometry {
  uint32          version            = 17; // incremented on incompatible format changes
  bool            geo_referenced     = 1;
  bytes           junction_starts    = 4;  // u32[] LE — cumulative vertex index per junction polygon
  bytes           junction_positions = 9;  // f64[] LE — [x0,y0,...] all junction polygon vertices
  bytes           tls_positions      = 5;  // f64[] LE — [x1,y1,x2,y2] per TLS bar
  repeated string edge_ids           = 6;
  repeated string junction_ids       = 7;
  repeated TlsEntry tls_entries      = 8;
  string          proj_parameter     = 10; // proj4 string from <location>, empty if not geo-referenced
  string          net_offset         = 11; // "x,y" offset from <location>
  bytes           lane_starts        = 12; // u32[] LE — cumulative vertex index per lane
  bytes           lane_positions     = 13; // f64[] LE — [x0,y0,x1,y1,...] all lane centerlines
  bytes           lane_widths        = 14; // f32[] LE — width in metres per lane
  bytes           lane_edge_indices  = 15; // u32[] LE — index into edge_ids per lane
  repeated string lane_ids           = 16;

  // Lane markings (computed from sumolib geometry, already converted to final coords)
  bytes           solid_marking_starts     = 18; // u32[] LE — cumulative vertex index per solid line
  bytes           solid_marking_positions  = 19; // f64[] LE — [x0,y0,...] solid marking vertices
  bytes           dashed_marking_starts    = 20; // u32[] LE — cumulative vertex index per dashed line
  bytes           dashed_marking_positions = 21; // f64[] LE — [x0,y0,...] dashed marking vertices

  // Turning arrows — one byte per lane, bit-field of allowed directions:
  //   bit 0 (1)  = straight (s)    bit 1 (2)  = left (l)
  //   bit 2 (4)  = right (r)       bit 3 (8)  = u-turn (t)
  //   bit 4 (16) = partial-left (L) bit 5 (32) = partial-right (R)
  bytes           lane_arrow_directions    = 22; // u8[]  LE — one byte per lane

  // Lane permission class — one byte per lane:
  //   0 = pedestrian/other  1 = bicycle only  2 = motorised (passenger/bus/truck/…)
  bytes           lane_perm_class          = 23; // u8[]  LE — one byte per lane
}

message EdgeData {
  string              id         = 1;
  map<string, double> attributes = 2;
}

message EdgeDataUpdate {
  int64             time_ms       = 1;
  repeated EdgeData edges         = 2;
  bool              full_snapshot = 3;  // true = initial all-edges baseline; false = occupied-only delta
}

// ---------------------------------------------------------------------------
// Service: sumo_control
// ---------------------------------------------------------------------------

message CommandAck {
  bool   ok    = 1;
  string error = 2;
}

message SetDelayRequest  { int32 delay_ms = 1; }
message PauseRequest     {}
message ResumeRequest    {}
message StepRequest      {}
message GetStateRequest  {}
message GetStateResponse {
  int32  delay_ms              = 1;
  bool   paused                = 2;
  string sumocfg_path          = 3;
  int32  step_interval_current = 4;
  bool   step_at_min_bound     = 5;
  bool   step_at_max_bound     = 6;
  string network_cache_path    = 7; // path to .ecaldeck file; empty if no network loaded
}

message GetAttributesRequest  {}
message GetAttributesResponse {
  repeated string vehicle_available = 1;
  repeated string vehicle_enabled   = 2;
  repeated string edge_available    = 3;
  repeated string edge_enabled      = 4;
}

message SetAttributesRequest {
  repeated string vehicle_attributes = 1;
  repeated string edge_attributes    = 2;
}

message SetStepConfigRequest {
  int32 interval_min = 1;  // minimum steps between publishes (default 1)
  int32 interval_max = 2;  // maximum steps (default 10)
  bool  autotune     = 3;  // auto-tune within [min, max] to keep collection <= 25% of step time
}

message LoadRequest { string sumocfg_path = 1; }

message LogMessage {
  int64  time_ms = 1;
  string level   = 2;  // INFO, WARNING, ERROR
  string text    = 3;
}

message ListDirRequest  { string path = 1; }
message ListDirResponse {
  string          path  = 1;
  repeated string dirs  = 2;
  repeated string files = 3;
  string          error = 4;
}

message GetVehicleInfoRequest  { string id = 1; }
message GetVehicleInfoResponse {
  string              type_id     = 1;
  string              route_id    = 2;
  string              lane_id     = 3;
  double              lane_pos    = 4;
  repeated string     route_edges = 5;
  map<string, double> attributes  = 6;
}

message GetEdgeInfoRequest  { string id = 1; }
message GetEdgeInfoResponse {
  double          mean_speed    = 1;
  int32           vehicle_count = 2;
  int32           halting_count = 3;
  double          occupancy     = 4;
  double          waiting_time  = 5;
  repeated string vehicle_ids   = 6;
}
